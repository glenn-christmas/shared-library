name: Trigger Web App

on:
  push:
    branches: ["main"]

jobs:
  call-webapp:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger other repo
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }} " \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/glenn-christmas/web-application/actions/workflows/listener.yml/dispatches \
          -d '{"ref": "main"}'
